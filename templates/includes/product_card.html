<div class="col">
  <div class="card product-card h-100 overflow-hidden">
    {% if product.image %}
      <img src="{{ product.image.url }}" class="card-img-top product-img" alt="{{ product.name }}">
    {% else %}
      <div class="product-img d-flex align-items-center justify-content-center">No image</div>
    {% endif %}
    <div class="card-body d-flex flex-column py-3 px-3">
      <h5 class="card-title text-truncate">{{ product.name }}</h5>
      <p class="brand-label text-muted mb-2">{{ product.brand }}</p>
      <p class="price mb-3">Rs {{ product.price }}</p>
      <div class="mt-auto">
        <a href="{% url 'product_detail' product.pk %}" class="btn btn-sm btn-primary btn-product">View Details</a>
      </div>
    </div>
  </div>
</div>
