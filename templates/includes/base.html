<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mobile Store{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .product-card {
      border: 1px solid #e9ecef;
      border-radius: 18px;
      box-shadow: 0 14px 35px rgba(18, 63, 96, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 45px rgba(18, 63, 96, 0.12);
    }
    .product-img {
      height: 140px;
      object-fit: contain;
      background: #f8f9fa;
      padding: 12px;
    }
    .product-detail-img {
      max-height: 420px;
      object-fit: contain;
      background: #f8f9fa;
      width: 100%;
      padding: 20px;
    }
    .card-title {
      font-size: 0.95rem;
      line-height: 1.3;
    }
    .price {
      color: #198754;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .brand-label {
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .btn-product {
      min-width: 100%;
      padding: 0.45rem 0.7rem;
    }
    .sidebar-card {
      border-radius: 1rem;
      border: 1px solid #e9ecef;
      box-shadow: 0 12px 28px rgba(18, 63, 96, 0.06);
    }
    .sidebar-card .card-header {
      background: #ffffff;
      font-weight: 700;
      letter-spacing: 0.02em;
      border-bottom: 1px solid #e9ecef;
    }
    .sidebar-card .list-group-item {
      border: none;
      padding: 0.85rem 1rem;
    }
    .sidebar-card .list-group-item a {
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .sidebar-card .list-group-item a:hover {
      color: #0d6efd;
      transform: translateX(4px);
    }
    .sidebar-card .list-group-item .badge {
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }
    .sidebar-sticky {
      position: sticky;
      top: 1rem;
    }
    .navbar-nav .nav-link:hover,
    .navbar-nav .btn-outline-light:hover,
    .navbar-nav .btn-outline-light:focus {
      color: #0d6efd !important;
    }
    .navbar-nav .btn-outline-light:hover {
      border-color: #0d6efd !important;
      background-color: #ffffff !important;
    }
  </style>
</head>
<body>
  {% include 'includes/header.html' %}

  <div class=" m-4">
    <div class="row g-4">
      <aside class="col-lg-3 order-2 order-lg-1 sidebar-sticky">
        {% include 'includes/sidebar.html' %}
      </aside>

      <main class="col-lg-9 order-1 order-lg-2">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  {% include 'includes/footer.html' %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
